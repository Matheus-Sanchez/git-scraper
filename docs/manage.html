<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerenciar Produtos</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <main class="page">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Git Scraper</p>
          <h1>Produtos</h1>
          <p class="subtitle">Catálogo versionado / Issues / Actions</p>
        </div>
        <div class="hero-actions">
          <a class="btn btn-ghost" href="./index.html">Dashboard</a>
          <button id="open-add" class="btn btn-primary" type="button">Novo Produto</button>
        </div>
      </header>

      <section class="card" aria-labelledby="manage-title">
        <div class="card-title-row">
          <div>
            <p class="section-kicker">Catálogo</p>
            <h2 id="manage-title">Produtos Monitorados</h2>
          </div>
          <label class="filter-field manage-repo-field" for="repo-input">
            <span>Repositório</span>
            <input id="repo-input" type="text" placeholder="owner/repo">
          </label>
        </div>

        <div id="manage-stats" class="stats-strip"></div>

        <div class="manage-toolbar filter-bar manage-filter-bar">
          <label class="filter-field" for="category-filter">
            <span>Categoria</span>
            <select id="category-filter">
              <option value="__all__">Todas</option>
            </select>
          </label>

          <label class="filter-field" for="active-filter">
            <span>Status</span>
            <select id="active-filter">
              <option value="__all__">Todos</option>
              <option value="active">Ativos</option>
              <option value="inactive">Inativos</option>
            </select>
          </label>

          <label class="filter-field filter-search" for="search-input">
            <span>Busca</span>
            <input id="search-input" type="text" placeholder="Nome, URL, loja ou grupo">
          </label>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Loja</th>
                <th>Categoria</th>
                <th>Grupo Comparação</th>
                <th>Ativo</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="products-manage-tbody">
              <tr><td colspan="6">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="manage-modal" class="modal" aria-hidden="true">
      <div class="modal-overlay" data-close-modal="true"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="manage-modal-title">
        <div class="modal-header">
          <h2 id="manage-modal-title">Produto</h2>
          <button id="close-manage-modal" class="icon-btn" type="button" aria-label="Fechar">x</button>
        </div>

        <form id="manage-form" class="form-grid">
          <input id="mf-product-id" type="hidden">

          <label>
            Nome
            <input id="mf-name" type="text" required>
          </label>

          <label>
            URL
            <input id="mf-url" type="url" required>
          </label>

          <label>
            Categoria
            <input id="mf-category" type="text" list="mf-category-list" autocomplete="off">
            <small id="mf-category-hint" class="field-hint"></small>
            <datalist id="mf-category-list"></datalist>
          </label>

          <label>
            Grupo de comparação
            <input id="mf-comparison-key" type="text" placeholder="mouse-g203">
          </label>

          <label>
            Unidades por pacote
            <input id="mf-units" type="number" min="1" step="1">
          </label>

          <label>
            Ativo
            <select id="mf-active">
              <option value="true">Sim</option>
              <option value="false">Não</option>
            </select>
          </label>

          <label class="full-width">
            Seletores CSS (um por linha)
            <textarea id="mf-price-css" rows="3"></textarea>
            <small class="field-hint">Use apenas seletores CSS (ex: <code>.a-price .a-offscreen</code>), não HTML completo.</small>
          </label>

          <label class="full-width">
            JSON-LD paths (um por linha)
            <textarea id="mf-jsonld" rows="3"></textarea>
          </label>

          <label class="full-width">
            Regex hints (um por linha)
            <textarea id="mf-regex" rows="2"></textarea>
          </label>

          <label class="full-width">
            Observações
            <textarea id="mf-notes" rows="2"></textarea>
          </label>

          <div class="form-actions full-width">
            <button type="submit" class="btn btn-primary">Abrir Issue de Alteração</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="./manage.js"></script>
  </body>
</html>

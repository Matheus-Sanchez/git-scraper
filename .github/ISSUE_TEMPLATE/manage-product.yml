name: Gerenciar Intencao
labels: [manage-product]
description: Adicionar, editar ou remover intencoes de busca de data/products.json.
title: "[MANAGE PRODUCT] "
body:
  - type: markdown
    attributes:
      value: |
        Escolha a acao. O bot valida e aplica a alteracao no arquivo `data/products.json`.
        URLs diretas de anuncios nao sao aceitas.
  - type: dropdown
    id: action
    attributes:
      label: Acao
      options:
        - add
        - edit
        - remove
      default: 0
    validations:
      required: true
  - type: input
    id: product_id
    attributes:
      label: ID da intencao
      description: Obrigatorio para edit/remove. Em add pode ficar vazio.
      placeholder: memoria-ram-ddr4
  - type: input
    id: name
    attributes:
      label: Nome do produto
      description: Obrigatorio em add. Opcional em edit.
      placeholder: Memoria RAM
  - type: input
    id: characteristics
    attributes:
      label: Caracteristicas
      description: Detalhes pesquisaveis.
      placeholder: DDR4 16GB
  - type: input
    id: category
    attributes:
      label: Categoria
      description: Opcional.
      placeholder: hardware
  - type: textarea
    id: stores
    attributes:
      label: Lojas
      description: Opcional. Vazio usa todas as lojas suportadas. Uma por linha.
  - type: textarea
    id: required_terms
    attributes:
      label: Termos obrigatorios
      description: Filtro duro.
  - type: textarea
    id: preferred_terms
    attributes:
      label: Termos preferenciais
      description: Prioridade de ranking, nao filtro duro.
  - type: textarea
    id: excluded_terms
    attributes:
      label: Termos banidos
      description: Opcional.
  - type: textarea
    id: required_attributes
    attributes:
      label: Atributos obrigatorios
      render: json
  - type: textarea
    id: preferred_attributes
    attributes:
      label: Atributos preferenciais
      render: json
  - type: input
    id: unit_rule
    attributes:
      label: Unidade base
      description: Opcional. Valores: unit, gb, kg, g, l, ml.
  - type: dropdown
    id: is_active
    attributes:
      label: Ativo para scraping?
      options:
        - true
        - false
      default: 0
  - type: textarea
    id: notes
    attributes:
      label: Observacoes
      description: Opcional.
  - type: textarea
    id: action_json
    attributes:
      label: JSON da acao (opcional)
      description: Se informado, tem prioridade sobre os campos acima.
      render: json
      placeholder: |
        {
          "action": "batch",
          "operations": [
            {
              "action": "add",
              "name": "Memoria RAM",
              "characteristics": "DDR4 16GB",
              "required_attributes": {"memory_type": "ddr4"},
              "preferred_attributes": {"capacity_total_gb": 16}
            }
          ]
        }

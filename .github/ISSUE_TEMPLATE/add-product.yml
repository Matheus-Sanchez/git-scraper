name: Adicionar Intencao de Busca
labels: [add-product]
description: Solicitar monitoramento de uma nova intencao de compra.
title: "[ADD PRODUCT] "
body:
  - type: markdown
    attributes:
      value: |
        Envie o que deve ser pesquisado nas lojas. URLs de anuncios nao sao aceitas no catalogo.
  - type: input
    id: name
    attributes:
      label: Nome do produto
      description: Nome base da busca.
      placeholder: Memoria RAM
    validations:
      required: true
  - type: input
    id: characteristics
    attributes:
      label: Caracteristicas
      description: Detalhes pesquisaveis. Use restricoes abaixo para separar obrigatorio de preferencial.
      placeholder: DDR4 16GB
  - type: input
    id: category
    attributes:
      label: Categoria
      description: Opcional.
      placeholder: hardware
  - type: textarea
    id: stores
    attributes:
      label: Lojas
      description: Opcional. Vazio usa todas as lojas suportadas. Uma por linha.
      placeholder: |
        amazon
        kabum
  - type: textarea
    id: required_terms
    attributes:
      label: Termos obrigatorios
      description: Filtro duro. Exemplo: ddr4.
  - type: textarea
    id: preferred_terms
    attributes:
      label: Termos preferenciais
      description: Prioridade de ranking, nao filtro duro. Exemplo: 16gb.
  - type: textarea
    id: excluded_terms
    attributes:
      label: Termos banidos
      description: Opcional. Exemplo: usado.
  - type: textarea
    id: required_attributes
    attributes:
      label: Atributos obrigatorios
      description: JSON opcional. Exemplo para RAM DDR4 ou fralda tamanho G.
      render: json
      placeholder: |
        {"memory_type":"ddr4"}
  - type: textarea
    id: preferred_attributes
    attributes:
      label: Atributos preferenciais
      description: JSON opcional. Exemplo para priorizar 16GB sem tornar obrigatorio.
      render: json
      placeholder: |
        {"capacity_total_gb":16}
  - type: input
    id: unit_rule
    attributes:
      label: Unidade base
      description: Opcional. Valores: unit, gb, kg, g, l, ml.
      placeholder: unit
  - type: dropdown
    id: is_active
    attributes:
      label: Ativo para scraping?
      options:
        - true
        - false
      default: 0
  - type: textarea
    id: notes
    attributes:
      label: Observacoes
      description: Opcional.
  - type: textarea
    id: product_json
    attributes:
      label: JSON do produto (opcional)
      description: Se informado, tem prioridade sobre os campos acima.
      render: json
      placeholder: |
        {
          "name": "Fralda",
          "characteristics": "tamanho G",
          "category": "higiene",
          "required_terms": ["fralda"],
          "required_attributes": {"size": "G"},
          "unit_rule": {"basis": "unit"},
          "is_active": true
        }

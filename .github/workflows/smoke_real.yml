name: Smoke Real

on:
  workflow_dispatch:
  schedule:
    - cron: '47 10 * * *'

concurrency:
  group: git-scraper-smoke-real
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke-real:
    name: smoke-real
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run live smoke for supported stores
        env:
          DEBUG: ${{ vars.DEBUG }}
          SCRAPING_API_KEY: ${{ secrets.SCRAPING_API_KEY }}
          AMAZON_PAAPI_ACCESS_KEY: ${{ secrets.AMAZON_PAAPI_ACCESS_KEY }}
          AMAZON_PAAPI_SECRET_KEY: ${{ secrets.AMAZON_PAAPI_SECRET_KEY }}
          AMAZON_PAAPI_PARTNER_TAG: ${{ vars.AMAZON_PAAPI_PARTNER_TAG }}
          HTTP_TIMEOUT_MS: ${{ vars.HTTP_TIMEOUT_MS }}
          CONCURRENCY: 1
          USER_AGENT: ${{ vars.USER_AGENT }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          SMOKE_MAX_PRODUCTS_PER_STORE: 1
        run: npm run smoke:real

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-real-${{ github.run_id }}
          path: .cache/smoke-real
          if-no-files-found: ignore

name: Daily Scrape

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

concurrency:
  group: git-scraper-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rapid QA suite
        run: npm run test:ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          DEBUG: ${{ vars.DEBUG }}
          SCRAPING_API_KEY: ${{ secrets.SCRAPING_API_KEY }}
          AMAZON_PAAPI_ACCESS_KEY: ${{ secrets.AMAZON_PAAPI_ACCESS_KEY }}
          AMAZON_PAAPI_SECRET_KEY: ${{ secrets.AMAZON_PAAPI_SECRET_KEY }}
          AMAZON_PAAPI_PARTNER_TAG: ${{ vars.AMAZON_PAAPI_PARTNER_TAG }}
          HTTP_TIMEOUT_MS: ${{ vars.HTTP_TIMEOUT_MS }}
          CONCURRENCY: ${{ vars.CONCURRENCY }}
          USER_AGENT: ${{ vars.USER_AGENT }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: npm run scrape

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          RUN_DATE=$(date -u +%F)
          git commit -m "chore(data): daily scrape ${RUN_DATE}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: scrape-debug-${{ github.run_id }}
          path: .cache/debug
          if-no-files-found: ignore

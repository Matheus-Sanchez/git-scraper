name: CI

on:
  push:
    paths-ignore:
      - 'data/**'
      - 'docs/data/**'
  pull_request:
    paths-ignore:
      - 'data/**'
      - 'docs/data/**'

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic PR QA suite
        run: npm run test:ci

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-${{ github.run_id }}
          path: .cache/debug
          if-no-files-found: ignore

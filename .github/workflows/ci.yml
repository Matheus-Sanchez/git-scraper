name: CI

on:
  push:
    paths-ignore:
      - 'data/**'
      - 'docs/data/**'
  pull_request:
    paths-ignore:
      - 'data/**'
      - 'docs/data/**'

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic PR QA suite
        run: npm run test:ci

      - name: Upload cache artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-cache-${{ github.run_id }}
          path: .cache
          if-no-files-found: ignore

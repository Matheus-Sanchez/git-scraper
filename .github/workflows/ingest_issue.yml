name: Ingest Add-Product Issue

on:
  issues:
    types: [opened, edited, labeled, reopened]
  workflow_dispatch:
    inputs:
      issue_numbers:
        description: Optional comma-separated issue numbers to replay. Leave empty to process all open catalog issues.
        required: false
        type: string

concurrency:
  group: git-scraper-ingest
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  resolve-issues:
    runs-on: ubuntu-latest
    outputs:
      default_branch: ${{ steps.resolve.outputs.default_branch }}
      has_issues: ${{ steps.resolve.outputs.has_issues }}
      matrix: ${{ steps.resolve.outputs.matrix }}

    steps:
      - name: Resolve issue backlog
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const rawInput = core.getInput('issue_numbers').trim();
            const prefixes = ['[ADD PRODUCT]', '[MANAGE PRODUCT]'];

            function isRelevant(issue) {
              const labels = (issue.labels || []).map((label) =>
                typeof label === 'string' ? label : label.name,
              );
              const title = String(issue.title || '');
              return (
                labels.includes('add-product') ||
                labels.includes('manage-product') ||
                prefixes.some((prefix) => title.startsWith(prefix))
              );
            }

            async function fetchIssue(issueNumber) {
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              return issue.pull_request ? null : issue;
            }

            let selectedIssues = [];

            if (eventName === 'issues') {
              const issue = context.payload.issue;
              if (issue && isRelevant(issue)) {
                selectedIssues = [{ issue_number: issue.number }];
              }
            } else if (rawInput) {
              const numbers = [...new Set(
                rawInput
                  .split(',')
                  .map((value) => Number.parseInt(value.trim(), 10))
                  .filter((value) => Number.isInteger(value) && value > 0),
              )];

              for (const issueNumber of numbers) {
                const issue = await fetchIssue(issueNumber);
                if (issue && isRelevant(issue)) {
                  selectedIssues.push({ issue_number: issue.number });
                }
              }
            } else {
              const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              selectedIssues = openIssues
                .filter((issue) => !issue.pull_request && isRelevant(issue))
                .map((issue) => ({ issue_number: issue.number }));
            }

            core.notice(
              selectedIssues.length > 0
                ? `Resolved ${selectedIssues.length} issue(s) for ingestion.`
                : 'No matching catalog issues found to ingest.',
            );
            selectedIssues.sort((left, right) => left.issue_number - right.issue_number);
            core.setOutput('default_branch', context.payload.repository.default_branch);
            core.setOutput('has_issues', selectedIssues.length > 0 ? 'true' : 'false');
            core.setOutput('matrix', JSON.stringify(selectedIssues));

  ingest:
    needs: resolve-issues
    if: needs.resolve-issues.outputs.has_issues == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.resolve-issues.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-issues.outputs.default_branch }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch issue payload
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issueNumber = Number('${{ matrix.issue_number }}');
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const eventPath = path.join(process.env.RUNNER_TEMP, `issue-event-${issueNumber}.json`);
            fs.writeFileSync(eventPath, JSON.stringify({ issue }, null, 2));
            core.setOutput('event_path', eventPath);
            core.setOutput('issue_number', String(issue.number));

      - name: Ingest issue payload
        id: ingest
        env:
          GITHUB_EVENT_PATH: ${{ steps.issue.outputs.event_path }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/ingest_issue.mjs

      - name: Commit product update
        if: steps.ingest.outputs.status == 'success'
        env:
          DEFAULT_BRANCH: ${{ needs.resolve-issues.outputs.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json docs/data/products.json
          if git diff --cached --quiet; then
            echo "No products.json change to commit"
            exit 0
          fi
          git commit -m "chore(products): ingest from issue #${{ steps.issue.outputs.issue_number }}"
          git pull --rebase origin "${DEFAULT_BRANCH}"
          git push origin HEAD:"${DEFAULT_BRANCH}"

      - name: Comment and close issue
        if: always() && steps.ingest.outputs.status != ''
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          INGEST_STATUS: ${{ steps.ingest.outputs.status }}
          INGEST_MESSAGE: ${{ steps.ingest.outputs.message }}
          INGEST_PRODUCT_ID: ${{ steps.ingest.outputs.product_id }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER || '0');
            const status = process.env.INGEST_STATUS || 'error';
            const message = process.env.INGEST_MESSAGE || 'Falha ao processar issue.';
            const productId = process.env.INGEST_PRODUCT_ID || '';

            const prefixes = {
              success: '[OK]',
              duplicate: '[INFO]',
              invalid: '[ERROR]',
              error: '[ERROR]',
              skipped: '[INFO]',
            };

            const prefix = prefixes[status] || '[INFO]';
            const productLine = productId ? `\n\nID: \`${productId}\`` : '';
            const comment = `${prefix} Status: **${status}**\n\n${message}${productLine}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment,
            });

            if (status !== 'skipped') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
              });
            }

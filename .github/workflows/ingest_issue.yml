name: Ingest Add-Product Issue

on:
  issues:
    types: [opened, edited, labeled, reopened]

concurrency:
  group: git-scraper-ingest
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    if: (
      contains(github.event.issue.labels.*.name, 'add-product') ||
      contains(github.event.issue.labels.*.name, 'manage-product') ||
      startsWith(github.event.issue.title, '[ADD PRODUCT]') ||
      startsWith(github.event.issue.title, '[MANAGE PRODUCT]')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest issue payload
        id: ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/ingest_issue.mjs

      - name: Commit product update
        if: steps.ingest.outputs.status == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json docs/data/products.json
          if git diff --cached --quiet; then
            echo "No products.json change to commit"
            exit 0
          fi
          git commit -m "chore(products): ingest from issue #${{ github.event.issue.number }}"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"

      - name: Comment and close issue
        if: always() && steps.ingest.outputs.status != ''
        uses: actions/github-script@v7
        env:
          INGEST_STATUS: ${{ steps.ingest.outputs.status }}
          INGEST_MESSAGE: ${{ steps.ingest.outputs.message }}
          INGEST_PRODUCT_ID: ${{ steps.ingest.outputs.product_id }}
        with:
          script: |
            const status = process.env.INGEST_STATUS || 'error';
            const message = process.env.INGEST_MESSAGE || 'Falha ao processar issue.';
            const productId = process.env.INGEST_PRODUCT_ID || '';

            const prefixes = {
              success: '[OK]',
              duplicate: '[INFO]',
              invalid: '[ERROR]',
              error: '[ERROR]',
              skipped: '[INFO]',
            };

            const prefix = prefixes[status] || '[INFO]';
            const productLine = productId ? `\n\nID: \`${productId}\`` : '';
            const comment = `${prefix} Status: **${status}**\n\n${message}${productLine}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

            if (status !== 'skipped') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
              });
            }
